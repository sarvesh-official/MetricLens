<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C47FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#bg)" />

  <!-- Lens circle (outer) -->
  <circle cx="230" cy="240" r="130" fill="none" stroke="white" stroke-width="20" opacity="0.9" />

  <!-- Lens glass -->
  <circle cx="230" cy="240" r="110" fill="url(#lens)" />

  <!-- Lens handle -->
  <line x1="325" y1="335" x2="430" y2="440" stroke="white" stroke-width="24" stroke-linecap="round" opacity="0.9" />

  <!-- Metric bars inside lens -->
  <rect x="170" y="280" width="24" height="60" rx="4" fill="white" opacity="0.85" />
  <rect x="206" y="240" width="24" height="100" rx="4" fill="white" opacity="0.85" />
  <rect x="242" y="210" width="24" height="130" rx="4" fill="white" opacity="0.85" />
  <rect x="278" y="250" width="24" height="90" rx="4" fill="white" opacity="0.85" />

  <!-- Pulse line across the lens -->
  <polyline points="155,230 185,230 200,200 220,260 240,190 260,240 280,220 305,230"
            fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" />

  <!-- Small sparkle dot -->
  <circle cx="175" cy="175" r="8" fill="white" opacity="0.5" />
</svg>
